# Deploy MSG Pool Services (website + admin) on Render
# https://render.com — free tier available
#
# 1. Push this repo to GitHub
# 2. Render → New → Blueprint → connect repo
# 3. Set ADMIN_EMAIL and ADMIN_PASSWORD in the dashboard
# 4. Point your domain to the Render URL

services:
  - type: web
    name: msg-pool-services
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: BASE_URL
        sync: false
