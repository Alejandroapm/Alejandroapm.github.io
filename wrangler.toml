# Cloudflare Pages + Workers (free tier) — serves site + admin API
# Docs: connect this GitHub repo in Cloudflare Dashboard → Workers & Pages → Create → Pages

name = "msg-pool-services"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "."

[build]
command = "npm install"

[[d1_databases]]
binding = "DB"
database_name = "msg-pool-db"
database_id = "REPLACE_AFTER_D1_CREATE"

[vars]
# Set secrets in Cloudflare dashboard (never commit passwords):
# ADMIN_EMAIL, ADMIN_PASSWORD, JWT_SECRET
