# Cloudflare Worker (free tier) — serves the static site + admin API
# Deploy: connect this GitHub repo in Cloudflare Dashboard → Workers & Pages → Create → Workers
# The build runs `npm install`, then the project's deploy command `npx wrangler deploy`.

name = "proud-sun-f507"
main = "worker.js"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

# Static assets (index.html, css/, js/, admin/, ...) are served directly.
# Anything not matching an asset falls through to worker.js (which handles /api/*).
[assets]
directory = "."
binding = "ASSETS"

[[d1_databases]]
binding = "DB"
database_name = "msg-pool-db"
database_id = "72534135-297c-416d-a347-9b21781c36a6"

# Workers AI — used to translate admin messages (Spanish → English).
# Free tier includes a daily allocation; falls back to a free public API if unavailable.
[ai]
binding = "AI"

[vars]
# Set secrets in the Cloudflare dashboard (never commit passwords):
# ADMIN_EMAIL, ADMIN_PASSWORD, JWT_SECRET 
