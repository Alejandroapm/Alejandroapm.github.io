<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- If your API runs on a different domain in production, set it here:
  <meta name="msg-api-origin" content="https://your-domain.com" /> -->
  <title>Admin Log In | MSG Pool Services</title>
  <link rel="stylesheet" href="../css/styles.css" />
  <link rel="stylesheet" href="../css/admin.css" />
</head>
<body class="admin-page">
  <header class="admin-topbar">
    <div class="container admin-topbar__inner">
      <a href="../index.html" class="brand">
        <img src="../assets/logo.png" alt="" class="brand__logo" style="width:48px;height:48px" />
        <span class="brand__name">MSG Pool Services</span>
      </a>
    </div>
  </header>

  <main class="admin-main">
    <div class="container">
      <div class="card admin-login-card">
        <h1>Admin log in</h1>
        <p class="fineprint admin-server-notice" id="serverNotice"></p>
        <form id="loginForm">
          <div class="form-row">
            <label for="email">Email</label>
            <input id="email" name="email" type="email" autocomplete="username" required />
          </div>
          <div class="form-row">
            <label for="password">Password</label>
            <input id="password" name="password" type="password" autocomplete="current-password" required />
          </div>
          <div class="form-row admin-remember">
            <label><input type="checkbox" id="rememberDevice" name="rememberDevice" /> Remember this device for 30 days</label>
            <p class="fineprint">Only your email is saved on this computer -never your password.</p>
          </div>
          <button class="btn btn--full" type="submit">Log in</button>
          <p class="fineprint form-status" id="formStatus" aria-live="polite"></p>
        </form>
        <p class="admin-back"><a href="../index.html">← Back to website</a></p>
      </div>
    </div>
  </main>

  <script type="module" src="login.js"></script>
</body>
</html>
